  .stat {
    background: #fff;

    border-radius: 8px;

    text-align: center;

  .stat .num { font-size: 22px; font-weight: 700; color: #111; }
  .stat.done .num { color: #16a34a; }
  .stat.pending .num { color: #d97706; }
  .stat .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .progress-wrap {
    background: #e5e7eb;
    border-radius: 99px;
    height: 7px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #16a34a;
    border-radius: 99px;
    transition: width 0.3s ease;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls input {
    flex: 1;
    min-width: 160px;
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
  }
  .controls input:focus { outline: 2px solid #16a34a; border-color: transparent; }

  .filter-btns { display: flex; gap: 6px; }
  .filter-btns button {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    background: #fff;
    font-size: 12px;
    cursor: pointer;
    color: #555;
    font-weight: 500;
    transition: all 0.15s;
  }
  .filter-btns button.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
  }
  thead th {
    background: #f9fafb;
    padding: 9px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #e5e7eb;
  }
  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody tr.is-done { opacity: 0.6; }
  td { padding: 8px 12px; vertical-align: middle; }

  td.num-col { color: #aaa; font-size: 12px; width: 40px; }
  td.city-col { font-weight: 500; }
  td.file-col { font-size: 12px; }
  td.file-col a {
    color: #2563eb;
    text-decoration: none;
    font-family: monospace;
    font-size: 12px;
  }
  td.file-col a:hover { text-decoration: underline; }
  td.file-col .no-file { color: #aaa; font-style: italic; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .status-badge.published { background: #dcfce7; color: #15803d; }
  .status-badge.pending { background: #fef3c7; color: #92400e; }
  .status-badge.pre { background: #f3f4f6; color: #9ca3af; }

  .toggle-btn {
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;

    background: #fff;
    border-color: #16a34a;
    color: #16a34a;

  .toggle-btn.mark-undone {
    background: #fff;
    border-color: #d1d5db;
    color: #9ca3af;
  }
  .toggle-btn.mark-undone:hover { background: #f3f4f6; }

  .empty { text-align: center; padding: 40px; color: #999; font-size: 13px; }
</style>

const STORAGE_KEY = "dc_city_tracker_v1";
let currentFilter = "all";

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}
function isPublished(c, state) {
  return c.prePublished || state[c.num] === true;
}
function toggle(num) {
  const c = CITIES.find(x => x.num === num);
  if (c.prePublished) return;
  const s = loadState();
  if (s[num]) delete s[num]; else s[num] = true;
  saveState(s);
  updateStats();
  renderTable();
}
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function updateStats() {
  const s = loadState();
  const total = CITIES.length;
  const done = CITIES.filter(c => isPublished(c, s)).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pending').textContent = total - done;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}
function renderTable() {
  const s = loadState();
  const q = document.getElementById('search').value.toLowerCase().trim();
  const rows = CITIES.filter(c => {
    const pub = isPublished(c, s);
    if (currentFilter === 'published' && !pub) return false;
    if (currentFilter === 'pending' && pub) return false;
    if (q && !c.city.toLowerCase().includes(q)) return false;
    return true;
  });
  const tbody = document.getElementById('table-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No cities match.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(c => {
    const pub = isPublished(c, s);
    let fileCell = '<span class="no-file">—</span>';
    if (c.file) {
      fileCell = `<a href="${HTML_DIR}${c.file}">${c.file}</a>`;
    }
    let badge, action;
    if (c.prePublished) {
      badge = '<span class="status-badge pre">Already Published</span>';
      action = '—';
    } else if (pub) {
      badge = '<span class="status-badge published">✓ Published</span>';
      action = `<button class="toggle-btn mark-undone" onclick="toggle(${c.num})">Undo</button>`;
    } else {
      badge = '<span class="status-badge pending">Pending</span>';
      action = `<button class="toggle-btn mark-done" onclick="toggle(${c.num})">Mark Published</button>`;
    }
    return `<tr class="${pub?'is-done':''}">
      <td class="num-col">${c.num}</td>
      <td class="city-col">${c.city}</td>
      <td>${badge}</td>
      <td class="file-col">${fileCell}</td>
      <td>${action}</td>
    </tr>`;
  }).join('');
}

updateStats();
renderTable();
</script>
</body>
</html>
